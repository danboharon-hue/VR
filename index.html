    // Verify the Phase 1 solution
    const p1Verify = verifySolution(scrambleStr, phase1SolutionText);
    const p1Color = p1Verify.solved ? 'var(--accent-green)' : 'var(--accent-red)';
    const p1Icon = p1Verify.solved ? '&#10003;' : '&#10007;';
    if (!window._vrVerificationResults) window._vrVerificationResults = [];
    window._vrVerificationResults = window._vrVerificationResults.filter(r => r.optIndex !== optIndex);
    window._vrVerificationResults.push({ optIndex, solutionIndex: 0, label: 'Phase 1 only', solutionText: phase1SolutionText, moveCount: phase1MoveCount, solved: p1Verify.solved, issues: p1Verify.issues, error: p1Verify.error });
    resultDiv.innerHTML = `
      <div class="phase2-panel">
        <div style="margin-bottom:4px; padding:0 4px; text-align:left;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:0.88em; font-weight:500; color:var(--text-muted);">Final solution &nbsp;${skeleton.length}<span style="color:var(--accent-blue)">${phase1DiffStr}</span>(${phase1MoveCount})</span>
        </div>
        <div class="final-solution" style="margin-top:0; margin-bottom:16px;">${phase1Html}</div>
        <div style="text-align:center; padding:24px 0;">
          <div style="font-size:2em; margin-bottom:10px; color:var(--accent-green);">✓</div>
          <div style="font-size:1.05em; font-weight:700; color:var(--accent-green);">Cube Solved</div>
          <div style="font-size:0.82em; color:var(--text-muted); margin-top:6px;">No ${sliceName}2 insertions needed</div>
        </div>
        ${allFinalsHtml}
      </div>
    `;
  } else {
    resultDiv.innerHTML = `
      <div class="phase2-panel">
        <div style="margin-bottom:4px; padding:0 4px; text-align:left;">
          <span style="font-family:'JetBrains Mono',monospace; font-size:0.88em; font-weight:500; color:var(--text-muted);">Step 1 skeleton &nbsp;${skeleton.length}<span style="color:var(--accent-blue)">${phase1DiffStr}</span>(${phase1MoveCount})</span>
        </div>
        <div class="final-solution" style="margin-top:0; margin-bottom:16px;">${phase1Html}</div>

        <div class="stage-header-sm">
          <span class="stage-badge">Step 2</span>
          <span class="stage-title">${sliceName}2 Insertions</span>
        </div>

        <div style="display:flex; align-items:center; justify-content:flex-start; gap:14px; margin-bottom:14px; padding:12px 16px; background:var(--bg-elevated); border-radius:var(--radius-md); border:1px solid var(--border-subtle); text-align:left;">
          <div class="target-type-badge" style="color:${swapColors[swapType]}; border-color:${swapColors[swapType]}; background:${badgeBg[swapType] || badgeBg['?']};">${typeDisplay[swapType] || swapType}</div>
          <div style="text-align:left;">
            ${!centersSolved ? '<div style="color:var(--accent-red); font-size:0.82em; margin-bottom:2px;">(centers not solved)</div>' : ''}
            <div style="font-size:0.85em; color:var(--text-secondary);">${needHtml}</div>
          </div>
        </div>

        <div class="sign-table" style="font-size:1.05em;"><table>${labelRow}${moveRow2}</table></div>
        ${allFinalsHtml || (neededTypes.length > 0 ? '<div style="text-align:center; padding:12px 0; color:var(--accent-red); font-size:0.95em;">No solution (could not find positions for all required types)</div>' : '')}
      </div>
    `;
  }
}

function showVRAnalysis(postDR, targetNum, drAxis, skeleton, htrStart, scramble, transSkeleton, transScramble) {
  // transSkeleton/transScramble are transformed to UD axis for E-slice simulation
  // For UD axis they are the same as skeleton/scramble
  if (!transSkeleton) transSkeleton = skeleton;
  if (!transScramble) transScramble = scramble;
  const axisNames = { [Axis.LR]: 'M', [Axis.UD]: 'E', [Axis.FB]: 'S' };

  // Determine axis roles based on drAxis
  // pipeAxis = the axis whose faces become pipes (U/D for E, F/B for S)
  // positiveAxis = the axis whose half turns are +1 (FB for E, UD for S)
  // negativeAxis = the remaining axis (-1)
  const pipeAxis = drAxis;
  // positiveAxis: E→FB, S→UD, M→FB
  const positiveAxis = drAxis === Axis.LR ? Axis.FB : (drAxis === Axis.UD ? Axis.FB : Axis.UD);
  // negativeAxis: E→LR, S→LR, M→UD (unused, for reference only)
  const negativeAxis = drAxis === Axis.LR ? Axis.UD : Axis.LR;

  // Compute signs for all moves
  const signs = [];
  const sideIndices = [];
  for (let i = 0; i < postDR.length; i++) {
    if (!isOnAxis(postDR[i].face, pipeAxis) && postDR[i].dir === Dir.Half) {
      sideIndices.push(i);
    }
  }

  for (let i = 0; i < postDR.length; i++) {
    const m = postDR[i];
    const isPipe = isOnAxis(m.face, pipeAxis);
    if (isPipe) {
      const isQt = m.dir !== Dir.Half;
      signs.push({ text: moveStr(m), sign: isQt ? '|' : '', isUD: true, isSide: false, isQt, pipeCost: isQt ? 0 : 1 });
    } else if (m.dir === Dir.Half) {
      const pop = sideIndices.filter(j => j > i).length;
      const isPositive = isOnAxis(m.face, positiveAxis);
      let signVal;
      if (pop % 2 === 0) { signVal = isPositive ? 1 : -1; }
      else { signVal = isPositive ? -1 : 1; }
      // M-axis: invert signs
      if (drAxis === Axis.LR) signVal = -signVal;
      signs.push({ text: moveStr(m), sign: signVal, isUD: false, isSide: true });
    } else {
      signs.push({ text: moveStr(m), sign: 'X', isUD: false, isSide: false, drBreaking: true });
    }
  }

  // Collect pipe positions by type
  const allPipePositions = [];
  for (let i = 0; i < signs.length; i++) {
    if (signs[i].isUD) {
      allPipePositions.push({ signIdx: i, cost: signs[i].isQt ? 0 : 1 });
    }
  }

  // Collect virtual insertion positions (#): gaps BETWEEN moves
  // # sits between two moves, where neither neighbor is a UD move.
  // Also allowed at the very start (before index 0) and very end (after last index).
  // virtualPositions stores "gap" indices: gap i = between signs[i-1] and signs[i].
  // Gap 0 = before first move, gap signs.length = after last move.
  const virtualPositions = [];
  for (let gap = 0; gap <= signs.length; gap++) {
    const leftIsUD = gap > 0 && signs[gap - 1].isUD;
    const rightIsUD = gap < signs.length && signs[gap].isUD;
    if (!leftIsUD && !rightIsUD) {
      virtualPositions.push(gap);
    }
  }

  function sumBetween(signIdxA, signIdxB) {
    let sum = 0;
    for (let i = signIdxA + 1; i < signIdxB; i++) {
      if (signs[i].sign === 1 || signs[i].sign === -1) {
        sum = vrAdd(sum, signs[i].sign);
      }
    }
    return sum;
  }

  // === Generate multi-pipe options ===
  // Build unified candidate list: real pipes (| cost 0, $ cost 1) and virtual # (cost 2)
  // Each candidate: { signIdx, type: 'qt'|'half'|'virtual', cost: 0|1|2, isGap: bool }
  // For real pipes, signIdx is the index in signs[]. For virtual #, signIdx is the gap index.
  const allCandidates = [];
  for (const p of allPipePositions) {
    allCandidates.push({ signIdx: p.signIdx, type: p.cost === 0 ? 'qt' : 'half', cost: p.cost, isGap: false });
  }
  for (const gap of virtualPositions) {
    allCandidates.push({ signIdx: gap, type: 'virtual', cost: 2, isGap: true });
  }
  // Sort candidates by position for consistent ordering
  // Real pipes sort by signIdx; virtual gaps sort by gap index
  // To compare: real pipe at signIdx i is "at position i", virtual gap at gap g is "between i-1 and i" → position g-0.5
  allCandidates.sort((a, b) => {
    const posA = a.isGap ? a.signIdx - 0.5 : a.signIdx;
    const posB = b.isGap ? b.signIdx - 0.5 : b.signIdx;
    return posA - posB;
  });

  // sumBetweenPipes: compute VR sum between two adjacent pipes in a selection
  // Each pipe is either a real move (signIdx = index into signs[]) or virtual gap (signIdx = gap index)
  // For a real pipe at signIdx i: boundary is AT index i (the pipe itself is not counted in the sum)
  // For a virtual gap at gap g: boundary is between signs[g-1] and signs[g]
  // Sum between pipe A and pipe B (A left of B):
  //   startIdx = A is real? A.signIdx + 1 : A.signIdx (gap is between A-1 and A, so signs from A onward)
  //   endIdx = B is real? B.signIdx : B.signIdx (gap is between B-1 and B, so signs up to B-1)
  function sumBetweenPipes(pipeA, pipeB) {
    const startIdx = pipeA.isGap ? pipeA.signIdx : pipeA.signIdx + 1;
    const endIdx = pipeB.isGap ? pipeB.signIdx : pipeB.signIdx;
    let sum = 0;
    for (let i = startIdx; i < endIdx; i++) {
      if (signs[i].sign === 1 || signs[i].sign === -1) {
        sum = vrAdd(sum, signs[i].sign);
      }
    }
    return sum;
  }

  // Compute total VR sum for a set of pipes (sorted by position).
  // Pipes are paired: (0,1), (2,3), (4,5), etc. Must be even count.
  // Each pair encloses a segment; total = vrAdd of all pair sums.
  function totalVRSum(pipes) {
    if (pipes.length < 2 || pipes.length % 2 !== 0) return null;
    let total = 0;
    for (let i = 0; i < pipes.length; i += 2) {
      total = vrAdd(total, sumBetweenPipes(pipes[i], pipes[i + 1]));
    }
    return total;
  }

  // Check if a virtual gap is adjacent to any other pipe in the selection
  // # at gap g is between signs[g-1] and signs[g]
  // Adjacent to a real pipe at signIdx i means: i === g-1 or i === g
  // Adjacent to another virtual gap at gap h means: |g - h| <= 1
  function isGapAdjacentToOthers(gap, selectedPipes) {
    for (const p of selectedPipes) {
      if (p.isGap) {
        if (Math.abs(gap - p.signIdx) <= 1) return true;
      } else {
        if (p.signIdx === gap - 1 || p.signIdx === gap) return true;
      }
    }
    return false;
  }

  // Recursive enumeration of all valid multi-pipe subsets
  // Options are grouped by totalCost (0, 1, 2, 3)
  const optionsByCost = [[], [], [], []]; // index = cost

  function enumeratePipes(startIdx, selected, currentCost) {
    // Check even-count selections (pipes come in pairs)
    if (selected.length >= 2 && selected.length % 2 === 0) {
      const vrSum = totalVRSum(selected);
      if (vrSum === targetNum) {
        const pipes = selected.map(p => ({ signIdx: p.signIdx, type: p.type, cost: p.cost }));
        const opt = { pipes, totalCost: currentCost };
        optionsByCost[currentCost].push(opt);
      }
    }

    // Try adding more pipes
    for (let i = startIdx; i < allCandidates.length; i++) {
      const cand = allCandidates[i];
      const newCost = currentCost + cand.cost;
      if (newCost > 3) continue; // Cost limit

      // Virtual gap: check adjacency to already selected pipes
      if (cand.isGap) {
        if (isGapAdjacentToOthers(cand.signIdx, selected)) continue;
      } else {
        // Real pipe: check no selected virtual gap is adjacent to this pipe
        let adjToVirtual = false;
        for (const s of selected) {
          if (s.isGap && (s.signIdx === cand.signIdx || s.signIdx === cand.signIdx + 1)) {
            adjToVirtual = true;
            break;
          }
        }
        if (adjToVirtual) continue;
      }

      selected.push(cand);
      enumeratePipes(i + 1, selected, newCost);
      selected.pop();
    }
  }

  enumeratePipes(0, [], 0);

  // Sort and dedup each cost tier
  function sortAndDedup(arr) {
    arr.sort((a, b) => a.pipes[0].signIdx - b.pipes[0].signIdx || a.pipes.length - b.pipes.length);
    const seen = new Set();
    const result = [];
    for (const opt of arr) {
      const key = opt.pipes.map(p => (p.type === 'virtual' ? 'v' : '') + p.signIdx).join(',');
      if (!seen.has(key)) { seen.add(key); result.push(opt); }
    }
    return result;
  }
  const t0 = sortAndDedup(optionsByCost[0]);
  const t1 = sortAndDedup(optionsByCost[1]);
  const t2 = sortAndDedup(optionsByCost[2]);
  const t3 = sortAndDedup(optionsByCost[3]);

  // When target is 0, add a "direct to step 2" option (no pipes selected)
  if (targetNum === 0) {
    t0.unshift({ pipes: [], totalCost: 0, isDirect: true });
  }

  // All cost tiers in array for easy iteration
  const costTiers = [t0, t1, t2, t3];

  // Combine all options for renderPhase2
  const allOptions = [...t0, ...t1, ...t2, ...t3];

  // Precompute Phase 2 best move count for each option (for BEST badge based on final solution)
  {
    const pf1 = drAxis === Axis.UD ? Face.U : (drAxis === Axis.FB ? Face.F : Face.L);
    const pf2 = drAxis === Axis.UD ? Face.D : (drAxis === Axis.FB ? Face.B : Face.R);
    const isPF = (f) => f === pf1 || f === pf2;
    const simSk = transSkeleton || skeleton;
    const simSc = transScramble || scramble;
    const kl = { '00':'0','ff':'0','rr':'0','gg':'0','fr':'g','fg':'r','rg':'f','rf':'g','gf':'r','gr':'f','0f':'f','0r':'r','0g':'g','f0':'f','r0':'r','g0':'g' };

    for (const opt of allOptions) {
      // Phase 1 setup
      const wideSet = new Set();
      const simVI = {};  // virtual insertions (sim coordinates)
      const simEM = {};  // expanded moves (sim coordinates)
      for (const pipe of opt.pipes) {
        const skIdx = pipe.signIdx + htrStart;
        if (pipe.type === 'virtual') {
          simVI[skIdx] = { face: Face.U, dir: Dir.CW };
        } else if (pipe.type === 'half') {
          const sm = simSk[skIdx];
          simEM[skIdx] = [{ face: sm.face, dir: Dir.CW }, { face: sm.face, dir: Dir.CW }];
          wideSet.add(skIdx);
        } else {
          wideSet.add(skIdx);
        }
      }

      // Expanded walk simulation
      let edges = solvedEdges();
      for (const m of simSc) edges = applyMoveCube(edges, m.face, m.dir);
      let twq = 0;
      const ees = {};  // expandedEdgeStates
      const pp = [];   // pipePositions
      for (let i = 0; i < simSk.length; i++) {
        if (simVI[i]) {
          edges = applyWideCube(edges, simVI[i].face, simVI[i].dir);
          edges = applyMoveCube(edges, simVI[i].face, dirInvert(simVI[i].dir));
          if (simVI[i].face === Face.U) twq = (twq + (4 - dirToQt(simVI[i].dir))) % 4;
          else if (simVI[i].face === Face.D) twq = (twq + dirToQt(simVI[i].dir)) % 4;
        }
        if (i >= htrStart) {
          if (simSk[i].face === Face.U || simSk[i].face === Face.D) pp.push(i);
          ees[i] = edges;
        }
        if (simEM[i]) {
          edges = applyWideCube(edges, simEM[i][0].face, simEM[i][0].dir);
          edges = applyMoveCube(edges, simEM[i][1].face, simEM[i][1].dir);
          if (simEM[i][0].face === Face.U) twq = (twq + (4 - dirToQt(simEM[i][0].dir))) % 4;
          else if (simEM[i][0].face === Face.D) twq = (twq + dirToQt(simEM[i][0].dir)) % 4;
        } else if (wideSet.has(i)) {
          edges = applyWideCube(edges, simSk[i].face, simSk[i].dir);
          if (simSk[i].face === Face.U) twq = (twq + (4 - dirToQt(simSk[i].dir))) % 4;
          else if (simSk[i].face === Face.D) twq = (twq + dirToQt(simSk[i].dir)) % 4;
        } else {
          edges = applyMoveCube(edges, simSk[i].face, simSk[i].dir);
        }
      }
      if (simVI[simSk.length]) {
        edges = applyWideCube(edges, simVI[simSk.length].face, simVI[simSk.length].dir);
        edges = applyMoveCube(edges, simVI[simSk.length].face, dirInvert(simVI[simSk.length].dir));
        if (simVI[simSk.length].face === Face.U) twq = (twq + (4 - dirToQt(simVI[simSk.length].dir))) % 4;
        else if (simVI[simSk.length].face === Face.D) twq = (twq + dirToQt(simVI[simSk.length].dir)) % 4;
      }
      ees[simSk.length] = edges;

      // Invalid centers
      if (twq === 1 || twq === 3) { opt.bestMoveCount = Infinity; continue; }

      // e2Types
      const fet = getE2SwapType(ees[simSk.length]);
      const applyRemExp = (state, fromIdx) => {
        let s = state;
        for (let j = fromIdx; j < simSk.length; j++) {
          if (j > fromIdx && simVI[j]) {
            s = applyWideCube(s, simVI[j].face, simVI[j].dir);
            s = applyMoveCube(s, simVI[j].face, dirInvert(simVI[j].dir));
          }
          if (simEM[j]) {
            s = applyWideCube(s, simEM[j][0].face, simEM[j][0].dir);
            s = applyMoveCube(s, simEM[j][1].face, simEM[j][1].dir);
          } else if (wideSet.has(j)) {
            s = applyWideCube(s, simSk[j].face, simSk[j].dir);
          } else {
            s = applyMoveCube(s, simSk[j].face, simSk[j].dir);
          }
        }
        if (simVI[simSk.length]) {
          s = applyWideCube(s, simVI[simSk.length].face, simVI[simSk.length].dir);
          s = applyMoveCube(s, simVI[simSk.length].face, dirInvert(simVI[simSk.length].dir));
        }
        return s;
      };
      const e2t = {};
      for (const i of pp) {
        let s = applyESlice(ees[i], Dir.Half);
        s = applyRemExp(s, i);
        const rt = getE2SwapType(s);
        e2t[i] = (rt !== '?') ? (kl[fet + rt] || 'g') : 'g';
      }

      // Needed types
      const cSolved = twq === 0;
      const swType = getE2SwapType(edges);
      let nt = [];
      if (swType === '0' && cSolved) nt = [];
      else if (swType === '0' && !cSolved) nt = ['g', 'r', 'f'];
      else if (!cSolved) nt = [swType];
      else {
        if (swType === 'f') nt = ['g', 'r'];
        else if (swType === 'r') nt = ['g', 'f'];
        else if (swType === 'g') nt = ['f', 'r'];
      }

      if (nt.length === 0) {
        opt.bestMoveCount = skeleton.length + opt.totalCost;
        continue;
      }

      // Phase 2 positions per type
      const p2bt = {};
      for (const needType of nt) {
        p2bt[needType] = [];
        let found = false;
        for (let i = htrStart; i < skeleton.length; i++) {
          if (wideSet.has(i)) continue;
          const m = skeleton[i];
          if (!isPF(m.face) || m.dir !== Dir.Half) continue;
          if (e2t[i] === needType) { p2bt[needType].push({ idx: i, exp: false, virt: false }); found = true; }
        }
        if (found) continue;
        for (let i = htrStart; i < skeleton.length; i++) {
          if (wideSet.has(i)) continue;
          const m = skeleton[i];
          if (!isPF(m.face) || m.dir === Dir.Half) continue;
          if (e2t[i] === needType) p2bt[needType].push({ idx: i, exp: true, virt: false });
        }
      }

      // Virtual gaps for missing types
      const missing = nt.filter(t => (p2bt[t] || []).length === 0);
      if (missing.length > 0) {
        for (let i = htrStart; i <= skeleton.length; i++) {
          const li = i - 1, ri = i;
          const lUD = li >= htrStart && isPF(skeleton[li].face);
          const lW = wideSet.has(li);
          const rUD = ri < skeleton.length && isPF(skeleton[ri].face);
          const rW = wideSet.has(ri);
          const lOK = li < htrStart || (!lUD && !lW);
          const rOK = ri >= skeleton.length || (!rUD && !rW);
          if (lOK && rOK && ees[i]) {
            let gs = applyESlice(ees[i], Dir.Half);
            gs = applyRemExp(gs, i);
            const gr = getE2SwapType(gs);
            if (gr !== '?') {
              const gt = kl[fet + gr] || 'g';
              if (missing.includes(gt)) {
                if (!p2bt[gt]) p2bt[gt] = [];
                p2bt[gt].push({ idx: i, exp: false, virt: true });
              }
            }
          }
        }
      }

      // Find minimum Phase 2 extra moves via backtracking
      let minP2 = Infinity;
      const usedP2 = new Set();
      const findMin = (ti, cur) => {
        if (cur >= minP2) return;
        if (ti === nt.length) { minP2 = cur; return; }
        const positions = p2bt[nt[ti]] || [];
        for (const pos of positions) {
          if (usedP2.has(pos.idx)) continue;
          usedP2.add(pos.idx);
          findMin(ti + 1, cur + (pos.virt ? 2 : (pos.exp ? 1 : 0)));
          usedP2.delete(pos.idx);
        }
      };
      findMin(0, 0);
      opt.bestMoveCount = minP2 === Infinity
        ? skeleton.length + opt.totalCost  // fallback: Phase 1 only
        : skeleton.length + opt.totalCost + minP2;
    }
  }
  const bestFinalMoveCount = Math.min(...allOptions.map(o => o.bestMoveCount || Infinity));

  // Determine auto-expand tier: show cheapest cost tier with options
  let autoTier = 0;
  while (autoTier < 3 && costTiers[autoTier].length === 0) autoTier++;

  // Build a set of virtual gap positions for quick lookup
  const virtualGapSet = new Set(virtualPositions);
  // The thin gap column style
  const gapTd = '<td class="gap-col"></td>';
  const hashGapTd = '<td class="gap-col" style="color:var(--accent-orange); font-weight:600;">#</td>';

  // Helper: for each row, iterate over moves and insert gap columns where virtual gaps exist
  function buildRowWithGaps(rowLabel, rowLabelStyle, cellFn) {
    let row = `<tr><td class="row-label" ${rowLabelStyle ? `style="${rowLabelStyle}"` : ''}>${rowLabel}</td>`;
    // Gap before first move
    if (virtualGapSet.has(0)) row += cellFn('gap', 0);
    for (let i = 0; i < signs.length; i++) {
      row += cellFn('move', i);
      // Gap after this move (= gap i+1)
      if (virtualGapSet.has(i + 1)) row += cellFn('gap', i + 1);
    }
    row += '</tr>';
    return row;
  }

  // Build moves row (always shown)
  const moveRow = buildRowWithGaps('', '', (type, idx) => {
    if (type === 'gap') return gapTd;
    const s = signs[idx];
    const cls = s.isUD ? 'move-cell-ud' : 'move-cell';
    return `<td class="${cls}">${s.text}</td>`;
  });

  // Build signs row: only show | at qt positions, +1/-1 for sides
  const signRow = buildRowWithGaps('', '', (type, idx) => {
    if (type === 'gap') return gapTd;
    const s = signs[idx];
    if (s.isUD && s.isQt) return '<td class="sign-pipe">|</td>';
    if (s.isSide) {
      const cls = s.sign === 1 ? 'sign-plus' : 'sign-minus';
      return `<td class="${cls}">${s.sign === 1 ? '+1' : '-1'}</td>`;
    }
    return '<td></td>';
  });

  // Build $ row: show $ at U2/D2 positions
  const dollarRow = buildRowWithGaps('', 'color:var(--accent-yellow);', (type, idx) => {
    if (type === 'gap') return gapTd;
    if (signs[idx].isUD && !signs[idx].isQt) {
      return '<td style="color:var(--accent-yellow); font-weight:600;">$</td>';
    }
    return '<td></td>';
  });

  // Build # row: show # at gap positions BETWEEN moves
  const hashRow = buildRowWithGaps('', 'color:var(--accent-orange);', (type, idx) => {
    if (type === 'gap') return hashGapTd;
    return '<td></td>';
  });

  // Build sums rows for each tier level
  // | and $ are ALWAYS pipe boundaries — sums are the same for tier 0 and tier 1
  // Only # adds new boundaries (tier 2 changes the sums)
  // Show segment total at the midpoint cell between consecutive pipes
  function buildSumsRowForTier(tierLevel) {
    // Collect pipe positions based on tier level
    // tier 0: only | (qt) are boundaries — $ is NOT shown
    // tier >= 1: | and $ are boundaries
    const pipePositions = [];
    for (let i = 0; i < signs.length; i++) {
      if (signs[i].isUD) {
        if (signs[i].isQt) {
          pipePositions.push({ idx: i, marker: '|', isGap: false });
        } else if (tierLevel >= 1) {
          pipePositions.push({ idx: i, marker: '$', isGap: false });
        }
      }
    }
    // # pipes (tier >= 2): these are at gap positions
    if (tierLevel >= 2) {
      for (const gap of virtualPositions) {
        pipePositions.push({ idx: gap, marker: '#', isGap: true });
      }
    }
    // Sort by position (gaps at idx-0.5 for ordering)
    pipePositions.sort((a, b) => {
      const posA = a.isGap ? a.idx - 0.5 : a.idx;
      const posB = b.isGap ? b.idx - 0.5 : b.idx;
      return posA - posB;
    });

    if (pipePositions.length < 2) return '';

    // Compute segment sums between consecutive pipes
    // segmentOf[moveIdx] = { segIdx, sum } for move columns between pipes
    // segmentOfGap[gapIdx] = { segIdx, sum } for gap columns between pipes
    const segments = []; // { startPipe, endPipe, sum, moveCells: [], gapCells: [] }
    for (let p = 0; p < pipePositions.length - 1; p++) {
      const pA = pipePositions[p];
      const pB = pipePositions[p + 1];
      // Sum the side values between these two pipes
      const startIdx = pA.isGap ? pA.idx : pA.idx + 1;
      const endIdx = pB.isGap ? pB.idx : pB.idx;
      let sum = 0;
      for (let i = startIdx; i < endIdx; i++) {
        if (signs[i].sign === 1 || signs[i].sign === -1) {
          sum = vrAdd(sum, signs[i].sign);
        }
      }
      // Collect move and gap cell indices in this segment
      const moveCells = [];
      const gapCells = [];
      for (let i = startIdx; i < endIdx; i++) {
        moveCells.push(i);
        // Check if there's a gap after this move that's in this segment
        if (virtualGapSet.has(i + 1) && i + 1 < endIdx) {
          gapCells.push(i + 1);
        }
      }
      // Also check gap before startIdx if it's in the segment
      if (virtualGapSet.has(startIdx) && startIdx === pA.idx && pA.isGap) {
        // The start is a gap pipe, don't include it in segment cells
      }
      segments.push({ sum, moveCells, gapCells });
    }

    // Build lookup: which cell should show the segment sum (midpoint)
    const cellToSum = new Map(); // moveIdx or 'g'+gapIdx → { sum, display }
    for (const seg of segments) {
      const allCells = [];
      // Interleave move and gap cells in order
      for (const mc of seg.moveCells) {
        allCells.push({ type: 'move', idx: mc });
        if (seg.gapCells.includes(mc + 1)) {
          allCells.push({ type: 'gap', idx: mc + 1 });
        }
      }
      if (allCells.length > 0) {
        const midIdx = Math.floor(allCells.length / 2);
        const mid = allCells[midIdx];
        const key = mid.type === 'gap' ? 'g' + mid.idx : 'm' + mid.idx;
        cellToSum.set(key, seg.sum);
      }
      // Mark all cells as "in segment" so we can empty non-mid ones
      for (const c of allCells) {
        const key = c.type === 'gap' ? 'g' + c.idx : 'm' + c.idx;
        if (!cellToSum.has(key)) cellToSum.set(key, null); // in segment but not midpoint
      }
    }

    // Build pipe position lookup
    const pipeAtMove = new Map(); // moveIdx → marker
    const pipeAtGap = new Set(); // gapIdx
    for (const p of pipePositions) {
      if (p.isGap) pipeAtGap.add(p.idx);
      else pipeAtMove.set(p.idx, p.marker);
    }

    return buildRowWithGaps('', '', (type, idx) => {
      if (type === 'gap') {
        if (pipeAtGap.has(idx)) {
          return '<td class="gap-col" style="color:var(--accent-orange); font-weight:600;">#</td>';
        }
        const key = 'g' + idx;
        if (cellToSum.has(key) && cellToSum.get(key) !== null) {
          const s = cellToSum.get(key);
          const label = s === 0 ? '0' : (s > 0 ? '+' + s : '' + s);
          const cls = s > 0 ? 'sign-plus' : (s < 0 ? 'sign-minus' : '');
          const style = s === 0 ? 'color:var(--text-primary);' : '';
          return `<td class="gap-col ${cls}" style="${style}">${label}</td>`;
        }
        return gapTd;
      }
      // Move column
      if (pipeAtMove.has(idx)) {
        const marker = pipeAtMove.get(idx);
        if (marker === '$') return '<td style="color:var(--accent-yellow); font-weight:600;">$</td>';
        return '<td class="sign-pipe">|</td>';
      }
      const key = 'm' + idx;
      if (cellToSum.has(key) && cellToSum.get(key) !== null) {
        const s = cellToSum.get(key);
        const label = s === 0 ? '0' : (s > 0 ? '+' + s : '' + s);
        const cls = s > 0 ? 'sign-plus' : (s < 0 ? 'sign-minus' : '');
        const style = s === 0 ? 'color:var(--text-primary);' : '';
        return `<td class="${cls}" style="${style}">${label}</td>`;
      }
      return '<td></td>';
    });
  }

  // sumsRow0: only | are boundaries (tier 0, no $ visible)
  // sumsRow1: | and $ are boundaries (tier 1, $ is visible)
  // sumsRow2: |, $, and # are all boundaries (tier 2+)
  const sumsRow0 = buildSumsRowForTier(0);
  const sumsRow1 = buildSumsRowForTier(1);
  const sumsRow2 = buildSumsRowForTier(2);

  // Map sign indices to skeleton indices
  const pipeToSkeletonIdx = [];
  for (let i = 0; i <= signs.length; i++) {
    pipeToSkeletonIdx.push(i + htrStart);
  }

  vrAnalysisState = {
    skeleton, htrStart, pipeToSkeletonIdx, scramble, scrambleStr: document.getElementById('scramble').value.trim(), skeletonStr: document.getElementById('skeleton').value.trim(), signs, allPipePositions, drAxis, transSkeleton, transScramble,
    options: allOptions, costTiers,
    currentTier: autoTier,
    moveRow, signRow, dollarRow, hashRow, virtualPositions,
    sumsRow0, sumsRow1, sumsRow2,
    bestFinalMoveCount,
  };

  // Build option rows HTML for a tier (multi-pipe aware)
  function buildOptionRows(tierOptions, globalOffset, tierLevel, minCost) {
    let html = '';
    const costColors = { 0: 'var(--accent-green)', 1: 'var(--accent-yellow)', 2: 'var(--accent-orange)', 3: 'var(--accent-red)', 4: 'var(--accent-red)' };
    for (let ti = 0; ti < tierOptions.length; ti++) {
      const optIdx = globalOffset + ti;
      const o = tierOptions[ti];
      const costBadge = `<span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;border:2px solid ${costColors[o.totalCost] || 'var(--text-muted)'};color:${costColors[o.totalCost] || 'var(--text-muted)'};font-weight:800;font-size:0.7em;margin-left:6px;">+${o.totalCost}</span>`;
      const bestBadge = (o.bestMoveCount != null && o.bestMoveCount === minCost) ? `<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;background:rgba(16,185,129,0.15);border:1.5px solid var(--accent-green);color:var(--accent-green);font-weight:700;font-size:0.6em;margin-left:8px;letter-spacing:0.5px;">BEST</span>` : '';

      // Separator between options
      if (ti > 0) {
        html += '<tr class="opt-separator"><td colspan="999"></td></tr>';
      }

      // Direct-to-step-2 option: simple row with label only
      if (o.isDirect) {
        const directRow = `<tr class="opt-row" onclick="onOptionClick(${optIdx})" title="Click to expand"><td class="row-label" style="white-space:nowrap;"><span id="vrExpandIcon${optIdx}" style="display:inline-block;transition:transform 0.2s;margin-left:2px;font-size:0.7em;">&#9654;</span> <span style="font-size:1.15em;font-weight:700;color:var(--accent-blue);">${optIdx + 1}</span>${costBadge}</td><td colspan="${bestBadge ? '98' : '99'}" style="color:var(--accent-green); font-size:0.85em; padding-left:8px;">Direct &mdash; no step 1</td>${bestBadge ? `<td style="text-align:right;white-space:nowrap;">${bestBadge}</td>` : ''}</tr>`;
        html += directRow;
        html += `<tr id="vrPhase2Row_${optIdx}" style="display:none;"><td class="phase2-cell" colspan="999"><div id="vrPhase2_${optIdx}"></div></td></tr>`;
        continue;
      }

      // Build sets for quick lookup of pipe positions in this option
      const optRealPipes = new Map(); // signIdx → type ('qt'|'half')
      const optVirtualPipes = new Set(); // gap indices
      for (const p of o.pipes) {
        if (p.type === 'virtual') {
          optVirtualPipes.add(p.signIdx);
        } else {
          optRealPipes.set(p.signIdx, p.type);
        }
      }

      const optRowStr = buildRowWithGaps(
        `<span id="vrExpandIcon${optIdx}" style="display:inline-block;transition:transform 0.2s;margin-left:2px;font-size:0.65em;color:var(--text-muted);">&#9654;</span> <span style="font-size:1.15em;font-weight:800;color:var(--accent-blue);">${optIdx + 1}</span>${costBadge}`,
        'white-space:nowrap;',
        (type, idx) => {
          if (type === 'gap') {
            // Check if this gap is one of the option's virtual pipe positions
            if (optVirtualPipes.has(idx)) {
              return '<td class="gap-col highlight-target" style="color:var(--accent-orange); font-weight:600;">#</td>';
            }
            // Show faded # for other virtual positions at tier 2
            if (tierLevel >= 2) {
              return '<td class="gap-col" style="color:var(--accent-orange); opacity:0.25;">#</td>';
            }
            return gapTd;
          }
          // Move column
          if (optRealPipes.has(idx)) {
            const pType = optRealPipes.get(idx);
            if (pType === 'half') {
              return '<td class="sign-pipe highlight-target" style="color:var(--accent-yellow);">$</td>';
            }
            return '<td class="sign-pipe highlight-target">|</td>';
          }
          if (signs[idx].isUD && signs[idx].isQt) {
            return '<td class="sign-pipe" style="opacity:0.25">|</td>';
          }
          if (tierLevel >= 1 && signs[idx].isUD && !signs[idx].isQt) {
            return '<td style="color:var(--accent-yellow); opacity:0.25;">$</td>';
          }
          return '<td></td>';
        }
      );
      // Wrap in a clickable row, add BEST badge at far right
      let clickableRow = optRowStr.replace('<tr>', `<tr class="opt-row" onclick="onOptionClick(${optIdx})" title="Click to expand">`);
      if (bestBadge) {
        clickableRow = clickableRow.replace('</tr>', `<td style="text-align:right;white-space:nowrap;padding-left:8px;">${bestBadge}</td></tr>`);
      }
      html += clickableRow;
      html += `<tr id="vrPhase2Row_${optIdx}" style="display:none;"><td class="phase2-cell" colspan="999"><div id="vrPhase2_${optIdx}"></div></td></tr>`;
    }
    return html;
  }

  // Build option rows for each cost tier
  // tierLevel is the cost (0,1,2,3) — determines which pipe markers to show faded
  // BEST badge uses precomputed bestFinalMoveCount (includes Phase 2)
  let offset = 0;
  const tierHtmls = [];
  for (let c = 0; c <= 3; c++) {
    tierHtmls.push(buildOptionRows(costTiers[c], offset, c, bestFinalMoveCount));
    offset += costTiers[c].length;
  }

  const targetLabel = targetNum === 0 ? '0' : (targetNum === 1 ? '+1' : '-1');
  const targetColor = targetNum === 0 ? 'var(--text-primary)' : (targetNum === 1 ? 'var(--accent-green)' : 'var(--accent-red)');

  // Build full skeleton display: all white, DR portion underlined as one continuous line
  let fullSkelHtml = '<span style="font-family:\'JetBrains Mono\',monospace; font-size:1.05em; line-height:1.8; word-break:break-word;">';
  // Pre-DR moves (no underline)
  for (let i = 0; i < htrStart; i++) {
    fullSkelHtml += `${moveStr(skeleton[i])} `;
  }
  // DR moves wrapped in one underline span
  if (htrStart < skeleton.length) {
    fullSkelHtml += '<span style="text-decoration:underline; text-decoration-color:var(--text-muted); text-underline-offset:4px; text-decoration-thickness:1.5px;">';
    for (let i = htrStart; i < skeleton.length; i++) {
      fullSkelHtml += moveStr(skeleton[i]);
      if (i < skeleton.length - 1) fullSkelHtml += ' ';
    }
    fullSkelHtml += '</span>';
  }
  fullSkelHtml += '</span>';

  const html = `
    <div class="vr-analysis">
      <div class="stage-header" style="justify-content:center;">
        <span class="stage-badge">Step 1</span>
      </div>
      <div style="margin-top:8px; margin-bottom:12px; padding:14px 20px; background:var(--bg-elevated); border:1px solid var(--border-subtle); border-radius:var(--radius-sm); font-family:'JetBrains Mono','Consolas',monospace; font-size:1.05em; direction:ltr; text-align:center; color:var(--text-primary); line-height:1.8; word-break:break-word;">${fullSkelHtml}</div>
      <div class="goal-display">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--text-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <span style="font-size:0.88em; font-weight:700; color:var(--text-muted); letter-spacing:0.1em;">Goal number -</span>
        <span style="display:inline-flex;align-items:center;padding:4px 14px;border-radius:12px;border:2px solid ${targetColor};color:${targetColor};font-family:'JetBrains Mono',monospace;font-weight:800;font-size:1.05em;">${targetLabel}</span>
        <span class="goal-axis">(${axisNames[drAxis]})${targetNum === 0 ? ' · 2e2e' : ''}</span>
      </div>
      <div class="sign-table"><table>
        <tbody id="vrSignRows"></tbody>
        <tbody><tr class="spacer-row"><td colspan="999"></td></tr></tbody>
        <tbody id="vrSumsRows"></tbody>
        <tbody><tr class="spacer-row"><td colspan="999"></td></tr></tbody>
        <tbody id="vrTier0Rows">${tierHtmls[0]}</tbody>
        <tbody id="vrTier1Rows">${tierHtmls[1]}</tbody>
        <tbody id="vrTier2Rows">${tierHtmls[2]}</tbody>
        <tbody id="vrTier3Rows">${tierHtmls[3]}</tbody>
      </table></div>
      <div style="display:flex; gap:8px; align-items:center; justify-content:center; padding:10px 0 16px;">
        <button class="expand-all-btn" id="vrMoreBtn" onclick="showMoreTier()">&#9662; More</button>
        <button class="expand-all-btn" id="vrLessBtn" onclick="showLessTier()">&#9652; Less</button>
        <button class="expand-all-btn" id="vrExpandAllBtn" onclick="expandAllOptions()">&#9660; Expand All</button>
      </div>
    </div>
  `;
  return html;
}

// ============================================================
// Verification report download
// ============================================================

function downloadVerificationReport() {
  const results = window._vrVerificationResults || [];
  if (results.length === 0) {
    alert('No solutions to verify. Click on options first to generate solutions.');
    return;
  }
  const scrambleStr = vrAnalysisState ? vrAnalysisState.scrambleStr : '(unknown)';
  const skeletonStr = vrAnalysisState ? vrAnalysisState.skeletonStr : '(unknown)';
  const drAxis = vrAnalysisState ? vrAnalysisState.drAxis : null;
  const axisName = drAxis === Axis.UD ? 'E' : (drAxis === Axis.FB ? 'S' : (drAxis === Axis.LR ? 'M' : '?'));

  const totalCount = results.length;
  const passCount = results.filter(r => r.solved).length;
  const failCount = totalCount - passCount;

  let report = '=== VR Finder Verification Report ===\n';
  report += 'Date: ' + new Date().toISOString() + '\n';
  report += 'DR Axis: ' + axisName + '\n\n';
  report += 'Scramble: ' + scrambleStr + '\n';
  report += 'Skeleton: ' + skeletonStr + '\n\n';
  report += 'Total solutions checked: ' + totalCount + '\n';
  report += 'Passed: ' + passCount + '\n';
  report += 'Failed: ' + failCount + '\n';
  report += '=====================================\n\n';

  // Sort by optIndex then solutionIndex
  const sorted = [...results].sort((a, b) => a.optIndex - b.optIndex || a.solutionIndex - b.solutionIndex);

  for (const r of sorted) {
    const status = r.solved ? 'PASS ✓' : 'FAIL ✗';
    report += `--- Option #${r.optIndex + 1}, ${r.label} (${r.moveCount} moves) ---\n`;
    report += `Status: ${status}\n`;
    report += `Solution: ${r.solutionText}\n`;
    if (!r.solved) {
      if (r.error) report += `Error: ${r.error}\n`;
      if (r.issues && r.issues.length > 0) report += `Issues: ${r.issues.join(', ')}\n`;
    }
    report += '\n';
  }

  if (failCount > 0) {
    report += '=== FAILURES SUMMARY ===\n';
    for (const r of sorted.filter(r => !r.solved)) {
      report += `Option #${r.optIndex + 1}, ${r.label}: ${r.error || r.issues.join(', ')}\n`;
      report += `  Solution: ${r.solutionText}\n`;
    }
  }

  // Download as text file
  const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vr-verification-report.txt';
  a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// Main VR finder function
// ============================================================

function findVR() {
  window._vrVerificationResults = []; // Clear previous verification results
  const errorEl = document.getElementById('error');
  const resultsEl = document.getElementById('results');
  errorEl.style.display = 'none';
  resultsEl.innerHTML = '';

  try {
    const scrambleStr = document.getElementById('scramble').value.trim();
    const skeletonStr = document.getElementById('skeleton').value.trim();

    if (!scrambleStr) throw new Error('Please enter a scramble.');
    if (!skeletonStr) throw new Error('Please enter a skeleton.');

    const scramble = parseAlg(scrambleStr);
    const skeleton = parseAlg(skeletonStr);

    const scrambledEdges = applyMovesCube(solvedEdges(), scramble);
    const afterSkeleton = applyMovesCube(scrambledEdges, skeleton);

    if (isSolved(afterSkeleton)) {
      resultsEl.innerHTML = '<div class="no-results">The cube is already solved. No VR needed.</div>';
      return;
    }

    const drAxis = detectDRAxis(afterSkeleton);
    if (drAxis === null) {
      throw new Error('Could not detect DR axis. The skeleton must solve all edges EXCEPT the 4 middle-layer slice edges (E/M/S). Check that all non-slice edges and corners are solved.');
    }

    const slicePositions = getSlicePositions(drAxis);
    const sliceName = drAxis === Axis.UD ? 'E' : (drAxis === Axis.FB ? 'S' : 'M');

    const htrStart = findHTRStart(skeleton, drAxis);
    const preDR = skeleton.slice(0, htrStart);
    const postDR = skeleton.slice(htrStart);

    let workPostDR = postDR;
    let workEdges = afterSkeleton;
    let transSkeleton = skeleton;
    let transScramble = scramble;

    if (drAxis !== Axis.UD) {
      const transAxis = drAxis === Axis.FB ? Axis.LR : Axis.FB;
      const transDir = Dir.CW;
      workPostDR = postDR.map(m => transformMove(m, transAxis, transDir));
      transScramble = scramble.map(m => transformMove(m, transAxis, transDir));
      transSkeleton = skeleton.map(m => transformMove(m, transAxis, transDir));
      const transPreDR = preDR.map(m => transformMove(m, transAxis, transDir));
      workEdges = applyMovesCube(applyMovesCube(solvedEdges(), transScramble), [...transPreDR, workPostDR].flat());
    }

    const vrSegments = toSegments(workPostDR);

    // Always use vrIn level 2 (full)
    const agg = aggregateVrIn2(vrSegments);

    const eSlice = [4, 5, 6, 7];
    let targetNum;
    if (drAxis === Axis.LR) {
      // M-axis: compute target directly from untransformed edges
      const mSlice = getSlicePositions(Axis.LR); // [0, 2, 8, 10]
      const cc = mSlice.filter(i => afterSkeleton[i].id === i && afterSkeleton[i].eo === 0).length;
      if (cc % 4 === 0) {
        targetNum = 0;
      } else {
        // Test with U2 F2 (two non-pipe half turns from different axes)
        let e2 = applyMoveCube(afterSkeleton, Face.U, Dir.Half);
        e2 = applyMoveCube(e2, Face.F, Dir.Half);
        const cc2 = mSlice.filter(i => e2[i].id === i && e2[i].eo === 0).length;
        targetNum = (cc2 % 4 === 0) ? 1 : -1;
      }
    } else {
      targetNum = getTargetNum(workEdges, eSlice);
    }

    resultsEl.innerHTML = showVRAnalysis(postDR, targetNum, drAxis, skeleton, htrStart, scramble, transSkeleton, transScramble);
    // Apply initial tier visibility after DOM is populated
    updateTierDisplay();
    // Phase 2 panels are prevented from expanding the table via CSS:
    // .phase2-cell > div { width: 0; min-width: 100%; overflow: hidden; }

  } catch (e) {
    errorEl.textContent = e.message;
    errorEl.style.display = 'block';
  }
}
